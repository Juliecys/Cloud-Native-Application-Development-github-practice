name: Failing CI Test

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run a simple command
        run: echo "This is a successful step!"  # 這個步驟成功執行

      - name: Fail on purpose
        run: exit 1  # 故意使這個步驟失敗
